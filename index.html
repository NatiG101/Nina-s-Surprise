<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>🌹 Surprise Rose</title>
  <!-- Import Tangerine font -->
  <link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@700&display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #fff0f6, #ffe6f0);
      font-family: Arial, sans-serif;
      transition: opacity 2s ease;
      overflow: hidden;
    }

    /* Star container */
    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle 4s infinite, drift 20s linear infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    @keyframes drift {
      from { transform: translateY(0); }
      to   { transform: translateY(-50px); }
    }

    dotlottie-wc {
      width: 50vw;
      height: 50vw;
      max-width: 600px;
      max-height: 600px;
      display: none; /* hidden initially */
    }
    dotlottie-wc.visible {
      display: block; /* show when class added */
    }

    h1 {
      margin-top: 5vh;
      font-family: 'Tangerine', cursive;
      font-size: 10vw;
      max-font-size: 100px;
      color: #b30059;
      text-shadow: 0 0 10px rgba(255,255,255,0.8);
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 1.5s ease, transform 1.5s ease;
      animation: glow 3s ease-in-out infinite alternate;
      text-align: center;
    }
    h1.visible { opacity: 1; transform: translateY(0); }

    @keyframes glow {
      from { text-shadow: 0 0 10px rgba(255,255,255,0.6); }
      to   { text-shadow: 0 0 25px rgba(255,200,220,1); }
    }

    .btn {
      margin-top: 3vh;
      background: #b30059;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      box-shadow: 0 6px 18px rgba(179,0,89,0.25);
    }

    .hint {
      margin-top: 2vh;
      color: #666;
      font-size: .9rem;
    }
  </style>
</head>
<body id="pageBody">
  <!-- Stars background -->
  <div class="stars" id="stars"></div>

  <!-- Rose animation (hidden initially) -->
  <dotlottie-wc id="roseAnim"
    src="https://lottie.host/f76a8dc1-1aa7-4d0a-b7f8-00a47706b1d7/ce0IcNAP5M.lottie"
    autoplay loop>
  </dotlottie-wc>

  <!-- Romantic message -->
  <h1 id="message">For You, Mearey🌹</h1>

  <!-- Play button -->
  <button id="playBtn" class="btn">Play Surprise</button>
  <div id="hint" class="hint">Tap the button ninaye</div>

  <!-- Background music -->
  <audio id="bgAudio" preload="auto">
    <source src="https://natig101.github.io/Nina-s-Surprise/shades.mp3" type="audio/mpeg">
  </audio>

  <!-- Lottie script -->
  <script type="module" src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.10/dist/dotlottie-wc.js"></script>

  <script>
    const btn = document.getElementById('playBtn');
    const audio = document.getElementById('bgAudio');
    const msg = document.getElementById('message');
    const hint = document.getElementById('hint');
    const body = document.getElementById('pageBody');
    const roseAnim = document.getElementById('roseAnim');

    // Generate 30 random stars
    const starContainer = document.getElementById('stars');
    for (let i = 0; i < 30; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDelay = (Math.random() * 4) + 's';
      const size = (Math.random() * 3) + 1;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      starContainer.appendChild(star);
    }

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      btn.textContent = 'Starting...';
      try {
        await audio.play();
        msg.classList.add('visible');
        roseAnim.classList.add('visible'); // show rose animation
        btn.style.display = 'none';
        hint.textContent = '';
      } catch (err) {
        console.error('Playback failed:', err);
        btn.disabled = false;
        btn.textContent = 'Try Again';
        hint.textContent = 'Could not play audio. Check file URL.';
      }
    });

    // Fade out after audio ends
    audio.addEventListener('ended', () => {
      body.style.opacity = '0';
      setTimeout(() => {
        window.location.href = "about:blank";
      }, 2000);
    });
  </script>
</body>
</html>
